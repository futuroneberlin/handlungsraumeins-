<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Handlungsraum</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const words = [
      "SOZIALE PLASTIK",
      "RAUM",
      "HANDLUNG",
      "PRAXIS",
      "BEUYS"
    ];

    function draw() {
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "white";
      ctx.font = "28px sans-serif";

      words.forEach((w, i) => {
        ctx.fillText(w, 80, 120 + i * 50);
      });

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
